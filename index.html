<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Đang Khóa</title>
    <style>
        /* Reset cơ bản */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* Lớp phủ bảo mật */
        #security-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1a1a1a, #000);
            color: #ff3e3e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2147483647; /* Lớp cao nhất có thể */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            
            /* Chặn tương tác CSS */
            pointer-events: all !important;
            touch-action: none !important;
            user-select: none !important;
        }

        .loader {
            border: 8px solid #222;
            border-top: 8px solid #ff3e3e;
            border-radius: 50%;
            width: 80px; height: 80px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #timer { font-size: 5rem; font-weight: bold; margin: 10px 0; }
        .status { text-transform: uppercase; letter-spacing: 3px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div id="security-overlay">
        <div class="loader"></div>
        <div class="status">Đang thiết lập bảo mật</div>
        <div id="timer">10</div>
        <div class="status">Vui lòng chờ giây lát...</div>
    </div>

    <div style="padding: 100px; text-align: center; color: white;">
        <h1>BẠN ĐÃ MỞ KHÓA THÀNH CÔNG!</h1>
        <p>Giờ bạn có thể tương tác với trang web.</p>
        <button onclick="alert('Đã bấm được!')" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">Nút Kiểm Tra</button>
    </div>

    <script>
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        const overlay = document.getElementById('security-overlay');

        // HÀM CHẶN ĐỨNG MỌI TƯƠNG TÁC (Touch, Click, Scroll)
        function killEvent(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }

        // Các sự kiện cần bị vô hiệu hóa
        const events = [
            'touchstart', 'touchmove', 'touchend', // Mobile
            'mousedown', 'mouseup', 'click', 'dblclick', // Mouse
            'contextmenu', 'wheel', 'keydown' // Keyboard & Other
        ];

        // Bắt đầu chặn
        events.forEach(event => {
            window.addEventListener(event, killEvent, { passive: false, capture: true });
        });

        // Vòng lặp đếm ngược
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                
                // Gỡ bỏ lệnh chặn
                events.forEach(event => {
                    window.removeEventListener(event, killEvent, { capture: true });
                });

                // Hiệu ứng biến mất mượt mà
                overlay.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                overlay.style.opacity = '0';
                overlay.style.transform = 'scale(1.1)';
                
                setTimeout(() => {
                    overlay.remove(); // Xóa hẳn khỏi bộ nhớ
                }, 600);
            }
        }, 1000);
    </script>
</body>
</html>
